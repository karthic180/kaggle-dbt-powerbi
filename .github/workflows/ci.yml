name: dbt CI (Windows Only)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-run:
    runs-on: windows-latest

    strategy:
      matrix:
        target: [duckdb, sqlite]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .dbt directory
        run: |
          mkdir $HOME\.dbt
          copy profiles.yml $HOME\.dbt\profiles.yml

      - name: Load data
        run: |
          python load_data.py

      - name: Run dbt models
        run: |
          dbt run --target ${{ matrix.target }}

      - name: Run dbt tests
        run: |
          dbt test --target ${{ matrix.target }}

      - name: Run dbt snapshot
        run: |
          dbt snapshot --target ${{ matrix.target }}